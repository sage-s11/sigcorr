{{- if eq .Values.mode "job" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sigcorr.fullname" . }}-{{ now | date "20060102-150405" }}
  labels:
    {{- include "sigcorr.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sigcorr.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sigcorr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      containers:
        - name: sigcorr
          image: {{ include "sigcorr.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["analyze", {{ .Values.job.pcapPath | quote }}]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /sigcorr/sigcorr-config.yaml
              subPath: sigcorr-config.yaml
              readOnly: true
            - name: pcaps
              mountPath: /data/pcaps
              readOnly: true
            - name: evidence
              mountPath: /sigcorr/evidence
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sigcorr.fullname" . }}-config
        - name: pcaps
          {{- if .Values.pcap.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.pcap.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: evidence
          {{- if .Values.evidence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.evidence.existingClaim }}
          {{- else if .Values.evidence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sigcorr.fullname" . }}-evidence
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
